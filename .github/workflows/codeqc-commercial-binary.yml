name: CodeQC Commercial Binary Gate

on:
  push:
    branches:
      - main
      - codex/add-codeqc-commercial
    paths:
      - "CodeQC_Commercial/**"
      - ".github/workflows/codeqc-commercial-binary.yml"
  pull_request:
    paths:
      - "CodeQC_Commercial/**"
      - ".github/workflows/codeqc-commercial-binary.yml"

permissions:
  contents: read

jobs:
  binary-only:
    name: Enforce binary-only commercial release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify commercial package boundary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $commercial = "CodeQC_Commercial"
          $zip = Join-Path $commercial "releases/CodeQC_Commercial_Windows_x64_0.4.0.zip"
          $sums = Join-Path $commercial "SHA256SUMS.txt"
          $forbiddenPattern = "\.(py|pyw|pyi|ts|tsx|rs|cs|java|go|cpp|c|h|hpp|toml|whl|gz|spec)$|pyproject|package\.json|package-lock|setup\."

          if (-not (Test-Path -LiteralPath $commercial)) {
            throw "Missing CodeQC_Commercial directory."
          }
          if (-not (Test-Path -LiteralPath $zip)) {
            throw "Missing commercial binary package: $zip"
          }
          if (-not (Test-Path -LiteralPath $sums)) {
            throw "Missing checksum file: $sums"
          }

          $badRepoFiles = @(
            Get-ChildItem -LiteralPath $commercial -Recurse -File -Force |
              Where-Object {
                $_.FullName -notlike "*.zip" -and $_.Name -match $forbiddenPattern
              }
          )
          if ($badRepoFiles.Count -gt 0) {
            $badRepoFiles | ForEach-Object { Write-Host $_.FullName }
            throw "Commercial source-like files are not allowed in CodeQC_Commercial."
          }

          $expectedHash = ((Get-Content -LiteralPath $sums -Raw).Trim() -split "\s+")[0].ToUpperInvariant()
          $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToUpperInvariant()
          if ($expectedHash -ne $actualHash) {
            throw "ZIP SHA256 mismatch. Expected $expectedHash, got $actualHash."
          }

          $zipBadEntries = @(tar -tf $zip | Where-Object { $_ -match $forbiddenPattern })
          if ($zipBadEntries.Count -gt 0) {
            $zipBadEntries | ForEach-Object { Write-Host $_ }
            throw "Commercial package contains source-like files."
          }

          Write-Host "CodeQC Commercial binary-only gate passed."

      - name: Verify commercial binary functionality
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PYTHONIOENCODING = "utf-8"
          $env:PYTHONUTF8 = "1"
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $zip = "CodeQC_Commercial/releases/CodeQC_Commercial_Windows_x64_0.4.0.zip"
          $work = Join-Path $env:RUNNER_TEMP "codeqc-commercial-smoke"
          $package = Join-Path $work "package"
          $sample = Join-Path $work "sample-project"
          $reports = Join-Path $work "reports"
          $baseline = Join-Path $work "baseline.json"

          New-Item -ItemType Directory -Force -Path $package, $sample, $reports | Out-Null
          Expand-Archive -LiteralPath $zip -DestinationPath $package
          Get-ChildItem -LiteralPath $package -Recurse -File | ForEach-Object {
            Write-Host "Extracted: $($_.FullName)"
          }
          $exeItem = Get-ChildItem -LiteralPath $package -Recurse -File -Filter "codeqc-runner.exe" | Select-Object -First 1
          if (-not $exeItem) {
            throw "Missing executable after extraction under: $package"
          }
          $exe = $exeItem.FullName

          @(
            "def suspicious_value():",
            "    return `"hardcoded`""
          ) | Set-Content -LiteralPath (Join-Path $sample "sample.py") -Encoding UTF8

          function Invoke-CodeQCSmoke([string]$Name, [string[]]$StepArgs) {
            Write-Host "Running $Name..."
            try {
              & $exe @StepArgs
            } catch {
              Write-Host "::error title=CodeQC $Name exception::$($_.Exception.Message)"
              throw
            }
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error title=CodeQC $Name failed::$Name failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          }

          Invoke-CodeQCSmoke "version" @("version")
          Invoke-CodeQCSmoke "health" @("health")
          Invoke-CodeQCSmoke "categories" @("categories")
          Invoke-CodeQCSmoke "route-spa" @("route", "SPA")
          Invoke-CodeQCSmoke "list-frontend" @("list", "frontend")
          Invoke-CodeQCSmoke "find-react" @("find", "React")
          Invoke-CodeQCSmoke "matrix" @("matrix")
          Invoke-CodeQCSmoke "classify" @("classify", "L1", "M1", "O3", "C3", "P1", "T0")
          Invoke-CodeQCSmoke "seeds-summary" @("seeds", "--summary")
          Invoke-CodeQCSmoke "similar" @("similar", "L2", "M4", "O1", "C3", "P1", "T0")
          Invoke-CodeQCSmoke "scanners" @("scanners")
          Invoke-CodeQCSmoke "patterns" @("patterns")
          Invoke-CodeQCSmoke "scan-sample" @("scan", $sample)
          Invoke-CodeQCSmoke "baseline-sample" @("baseline", $sample, "--project-name", "DualAxisSample", "--profile", "advisory", "--output", $baseline)
          Invoke-CodeQCSmoke "report-sample" @("report", $sample, "--project-name", "DualAxisSample", "--profile", "advisory", "--baseline-file", $baseline, "--report-dir", $reports, "--format", "html", "--format", "json", "--format", "sarif")

          if (-not (Test-Path -LiteralPath $baseline)) {
            throw "Baseline command did not produce $baseline"
          }
          $reportFiles = @(Get-ChildItem -LiteralPath $reports -File)
          if ($reportFiles.Count -lt 3) {
            throw "Expected HTML/JSON/SARIF report outputs, found $($reportFiles.Count)."
          }
          $session = Get-ChildItem -LiteralPath $reports -Filter "*session.json" | Select-Object -First 1
          if (-not $session) {
            throw "Missing session JSON report."
          }
          $payload = Get-Content -LiteralPath $session.FullName -Raw | ConvertFrom-Json
          if ([int]$payload.filtered_file_count -lt 1) {
            throw "Report did not scan the sample project."
          }
          if ([int]$payload.raw_findings_total -lt 1) {
            throw "Defect axis did not detect the known R19 sample finding."
          }
          if ([int]$payload.baseline.suppressed -lt 1) {
            throw "Baseline/report flow did not suppress the known sample finding."
          }

          Write-Host "CodeQC Commercial binary functionality gate passed."
